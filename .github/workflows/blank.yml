name: Build Node.js for OpenHarmony

on:
  push:
    branches: [ "main" ]  # 推送到main分支时触发
  pull_request:
    branches: [ "main" ]  # PR到main分支时触发
  release:
    types: [created]  # 创建发布时触发
  workflow_dispatch:  # 手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Build
      run: ./build.sh v24.2.0
    
    - name: Upload artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: node-openharmony
        path: |
          *.tar.gz
          *.zip
